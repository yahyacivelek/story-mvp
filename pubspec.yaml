name: story
description: "An interactive storytelling application with dynamic audio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Audio playback (seamless looping + concurrent streams)
  just_audio: ^0.9.40

  # Networking
  dio: ^5.4.3+1

  # Environment variables / secrets
  flutter_dotenv: ^5.1.0

  # Speech recognition
  speech_to_text: ^7.0.0

  # Offline speech recognition (Vosk) — feature/vosk-offline-stt branch
  vosk_flutter: ^0.3.48

  # Deepgram streaming STT
  web_socket_channel: ^2.4.5
  record: ^5.0.4

  # Runtime permissions
  permission_handler: ^11.3.1

  # Audio session (AudioFocus)
  audio_session: ^0.1.21

  # Persistent on-device file paths for cached audio
  path_provider: ^2.1.3

  # SHA1 hashing for cache filenames
  crypto: ^3.0.3
  idb_shim: ^2.9.2
  web: ^1.1.0
  cunning_document_scanner: ^1.2.3
  google_generative_ai: ^0.4.7
  image: ^4.8.0
  path: ^1.9.1
  json_schema: ^5.2.2
  share_plus: ^10.0.0
  archive: ^4.0.9
  file_picker: ^11.0.0
  wakelock_plus: ^1.2.10

dependency_overrides:
  permission_handler: ^11.3.1
  http: ^1.2.0
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/stories/
    - assets/audio/
    - assets/schemas/
